<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burgers Point | Full Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body class="bg-zinc-900 text-white font-sans">

    <header class="p-6 text-center border-b border-zinc-800 shadow-2xl">
        <h1 class="text-4xl font-black text-orange-500 uppercase tracking-tighter italic">Burgers Point</h1>
        <p class="text-gray-400 mt-2">সেরা স্বাদের খোঁজে...</p>
    </header>

    <main class="max-w-4xl mx-auto p-4 mb-32">
        
        <div id="menu-container">
            </div>

    </main>

    <div class="fixed bottom-0 left-0 w-full bg-zinc-800 border-t border-zinc-700 p-4 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-xs text-gray-400">Total Items</p>
                <p id="total-count" class="text-xl font-bold text-orange-500">0</p>
            </div>
            <button onclick="openOrderModal()" class="bg-orange-600 px-8 py-3 rounded-2xl font-bold hover:bg-orange-500 active:scale-95 transition">অর্ডার করুন</button>
        </div>
    </div>

    <div id="orderModal" class="fixed inset-0 bg-black/90 hidden z-[100] p-6 flex items-center justify-center">
        <div class="bg-zinc-800 p-6 rounded-3xl w-full max-w-md border border-zinc-700">
            <h2 class="text-2xl font-bold mb-4">অর্ডার কনফার্ম করুন</h2>
            <input type="text" id="custName" placeholder="আপনার নাম" class="w-full p-4 mb-4 bg-zinc-900 rounded-xl outline-none border border-zinc-700 focus:border-orange-500">
            
            <div class="bg-zinc-900 p-4 rounded-xl mb-4 text-center">
                <button onclick="getLocation()" class="text-orange-500 font-bold">📍 অটোমেটিক লোকেশন সেট করুন</button>
                <p id="locationStatus" class="text-xs text-gray-500 mt-2">লোকেশন সেট করা হয়নি</p>
            </div>

            <div class="flex gap-2">
                <button onclick="closeOrderModal()" class="flex-1 bg-zinc-700 py-3 rounded-xl font-bold">বাতিল</button>
                <button onclick="sendToTelegram()" class="flex-1 bg-orange-600 py-3 rounded-xl font-bold">অর্ডার পাঠান</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
